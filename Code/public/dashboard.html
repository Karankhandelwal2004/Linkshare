<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShare — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b10;
      --card: #0d1520;
      --card-hover: #121d2e;
      --border: #1c2d3f;
      --border-bright: #2a4055;
      --text: #c8d8e4;
      --text-dim: #4d6a7a;
      --accent: #00e87a;
      --accent-dim: rgba(0,232,122,0.15);
      --accent-glow: rgba(0,232,122,0.35);
      --cyan: #00bbee;
      --cyan-dim: rgba(0,187,238,0.15);
      --cyan-glow: rgba(0,187,238,0.35);
      --error: #ff3355;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
      --header-h: 60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
    }

    /* ── App shell ── */
    .app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,11,16,0.95);
      backdrop-filter: blur(8px);
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    .header-logo {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 16px var(--accent-glow);
      flex-shrink: 0;
    }
    .header-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }
    .device-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,232,122,0.06);
      border: 1px solid rgba(0,232,122,0.2);
      border-radius: 3px;
      padding: 5px 12px 5px 10px;
      flex-shrink: 0;
    }
    .badge-icon { font-size: 1.05rem; line-height: 1; }
    .badge-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
    }
    .badge-status {
      font-size: 0.58rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      opacity: 0.7;
    }
    .ws-indicator {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      padding: 4px 10px;
      border-radius: 3px;
      transition: all 0.3s;
    }
    .ws-live    { color: var(--accent); background: var(--accent-dim); }
    .ws-offline { color: #888;         background: rgba(255,255,255,0.04); animation: wsFlash 1s step-end infinite; }
    @keyframes wsFlash { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .header-spacer { flex: 1; }
    .logout-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .logout-btn:hover { color: var(--error); border-color: var(--error); background: rgba(255,51,85,0.06); }

    /* ── Main two-column layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 380px;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* ── Left panel: device grid ── */
    .left-panel {
      overflow-y: auto;
      padding: 20px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header-badge {
      color: var(--accent);
      font-size: 0.62rem;
    }

    /* ── Device grid ── */
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    /* ── Device card ── */
    .device-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px 12px 14px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s, opacity 0.18s;
      user-select: none;
    }
    .device-card:hover:not(.offline):not(.self) {
      border-color: var(--border-bright);
      background: var(--card-hover);
    }
    .device-card.selected {
      border-color: var(--accent) !important;
      background: rgba(0,232,122,0.04) !important;
      box-shadow: 0 0 12px rgba(0,232,122,0.12), inset 0 0 20px rgba(0,232,122,0.03);
    }
    .device-card.offline {
      opacity: 0.38;
      cursor: not-allowed;
    }
    .device-card.self {
      cursor: default;
      border-color: rgba(0,187,238,0.25);
      background: rgba(0,187,238,0.03);
    }

    .status-dot {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .status-dot.online  { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: dotPulse 2.2s ease-in-out infinite; }
    .status-dot.offline { background: #2a3a4a; }
    .status-dot.me      { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
    @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.6} }

    .card-icon  { font-size: 1.8rem; margin-bottom: 8px; line-height: 1; }
    .card-name  { font-size: 0.67rem; font-weight: 700; color: var(--text); letter-spacing: 0.04em; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-label { font-size: 0.55rem; letter-spacing: 0.2em; }
    .card-label.online  { color: var(--accent); }
    .card-label.offline { color: var(--text-dim); }
    .card-label.me      { color: var(--cyan); }

    /* ── Broadcast card ── */
    .broadcast-card {
      background: linear-gradient(135deg, rgba(0,187,238,0.06), rgba(0,232,122,0.04));
      border: 1px solid rgba(0,187,238,0.25);
      border-radius: 4px;
      padding: 18px 12px 14px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
      user-select: none;
    }
    .broadcast-card:hover {
      border-color: var(--cyan);
      background: rgba(0,187,238,0.08);
    }
    .broadcast-card.selected {
      border-color: var(--cyan) !important;
      box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 20px rgba(0,187,238,0.03);
    }
    .broadcast-card .card-icon  { color: var(--cyan); }
    .broadcast-card .card-name  { color: var(--cyan); }
    .broadcast-card .card-label { color: rgba(0,187,238,0.6); font-size: 0.55rem; letter-spacing: 0.2em; }

    /* ── Right panel ── */
    .right-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Send section ── */
    .send-section {
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .target-display {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(0,232,122,0.2);
      border-radius: 3px;
      padding: 6px 10px;
      min-height: 30px;
      display: flex;
      align-items: center;
    }
    .target-display.broadcast { color: var(--cyan); background: var(--cyan-dim); border-color: rgba(0,187,238,0.2); }

    textarea#message-input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 10px 12px;
      resize: none;
      height: 72px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    textarea#message-input:focus { border-color: rgba(0,232,122,0.4); }
    textarea#message-input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 3px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      padding: 10px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.1s;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .send-btn:active:not(:disabled) { transform: scale(0.98); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── History section ── */
    .history-section {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .history-count-badge {
      font-size: 0.58rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 2px 7px;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-empty {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      margin-top: 24px;
    }

    /* ── History items ── */
    .history-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .history-item:hover { border-color: var(--border-bright); }
    .history-item.received { border-left: 2px solid var(--accent); }
    .history-item.sent     { border-left: 2px solid rgba(0,187,238,0.6); }

    .hist-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 0.6rem;
      flex-wrap: wrap;
    }
    .hist-from   { color: var(--text); font-weight: 700; }
    .hist-arrow  { color: var(--text-dim); }
    .hist-target { color: var(--text-dim); font-size: 0.58rem; }
    .hist-time   { margin-left: auto; color: var(--text-dim); font-size: 0.58rem; flex-shrink: 0; }

    .hist-content {
      font-size: 0.76rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-all;
      line-height: 1.5;
    }
    .history-item.expanded .hist-content {
      white-space: pre-wrap;
      overflow: visible;
      text-overflow: unset;
    }
    .hist-content a {
      color: var(--cyan);
      text-decoration: none;
    }
    .hist-content a:hover { text-decoration: underline; }

    /* ── Full-screen popup ── */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7,11,16,0.88);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .popup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .popup-card {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 36px 40px 32px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 60px rgba(0,232,122,0.14), 0 0 120px rgba(0,232,122,0.06);
      animation: popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.82); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .popup-tag {
      font-size: 0.58rem;
      letter-spacing: 0.32em;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 20px;
    }
    .popup-from {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .popup-from-icon { font-size: 2.4rem; line-height: 1; }
    .popup-from-info { display: flex; flex-direction: column; }
    .popup-from-label { font-size: 0.58rem; letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 3px; }
    .popup-from-name  { font-family: var(--display); font-size: 1.2rem; font-weight: 700; color: var(--accent); }

    .popup-content-box {
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
      line-height: 1.6;
    }
    .popup-content-box a {
      color: var(--cyan);
      text-decoration: none;
    }
    .popup-content-box a:hover { text-decoration: underline; }

    .popup-time {
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.12em;
      margin-bottom: 22px;
    }
    .popup-actions {
      display: flex;
      gap: 10px;
    }
    .popup-btn {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .popup-copy {
      background: transparent;
      border: 1px solid var(--border-bright);
      color: var(--text-dim);
    }
    .popup-copy:hover { border-color: var(--cyan); color: var(--cyan); }
    .popup-dismiss {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .popup-dismiss:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 16px var(--accent-glow); }

    /* ── Scanlines overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-logo">LINKSHARE</div>
    <div class="header-sep"></div>
    <div class="device-badge">
      <span class="badge-icon" id="badge-icon">●</span>
      <div>
        <div class="badge-name" id="badge-name">…</div>
        <div class="badge-status">● ONLINE</div>
      </div>
    </div>
    <div class="ws-indicator ws-offline" id="ws-status">○ CONNECTING</div>
    <div class="header-spacer"></div>
    <button class="logout-btn" id="logout-btn">LOGOUT</button>
  </header>

  <!-- ── Main ── -->
  <div class="main">

    <!-- Left: device grid -->
    <div class="left-panel">
      <div class="panel-header">
        <span>NETWORK NODES</span>
        <span class="panel-header-badge" id="online-count">0 ONLINE</span>
      </div>
      <div class="device-grid" id="device-grid">
        <!-- Device cards injected by JS -->
        <div class="broadcast-card" id="broadcast-card" onclick="selectBroadcast()">
          <div class="card-icon">⚡</div>
          <div class="card-name">BROADCAST</div>
          <div class="card-label">ALL DEVICES</div>
        </div>
      </div>
    </div>

    <!-- Right: send + history -->
    <div class="right-panel">
      <div class="send-section">
        <div class="panel-header" style="border:none;padding:0 0 10px;">
          <span>TRANSMIT</span>
        </div>
        <div class="target-display broadcast" id="target-display">⚡ BROADCAST — ALL DEVICES</div>
        <textarea id="message-input" placeholder="Paste URL or any text…" spellcheck="false"></textarea>
        <button class="send-btn" id="send-btn" disabled>SEND</button>
      </div>

      <div class="history-section">
        <div class="history-header">
          <span>SIGNAL LOG</span>
          <span class="history-count-badge" id="history-count">0</span>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty" id="history-empty">NO SIGNALS YET</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Incoming share popup ── -->
<div class="popup-overlay" id="popup-overlay">
  <div class="popup-card">
    <div class="popup-tag">▼  INCOMING TRANSMISSION  ▼</div>
    <div class="popup-from">
      <span class="popup-from-icon" id="popup-icon">📡</span>
      <div class="popup-from-info">
        <span class="popup-from-label">FROM NODE</span>
        <span class="popup-from-name" id="popup-name">—</span>
      </div>
    </div>
    <div class="popup-content-box" id="popup-content"></div>
    <div class="popup-time" id="popup-time"></div>
    <div class="popup-actions">
      <button class="popup-btn popup-copy" id="popup-copy">COPY</button>
      <button class="popup-btn popup-dismiss" id="popup-dismiss">DISMISS</button>
    </div>
  </div>
</div>

<script>
  let myDevice = null;
  let devices  = [];
  let ws       = null;
  let wsTimer  = null;
  let selectedTarget = 'all';
  let histCount = 0;

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    const meRes = await fetch('/api/me');
    if (!meRes.ok) { window.location.href = '/public/login.html'; return; }
    myDevice = await meRes.json();

    document.getElementById('badge-icon').textContent = myDevice.icon;
    document.getElementById('badge-name').textContent = myDevice.name;
    document.title = `LinkShare — ${myDevice.name}`;

    // Load and display historical events
    const histRes = await fetch('/api/history');
    if (histRes.ok) {
      const all = await histRes.json();
      const relevant = all.filter(isRelevantToMe).reverse();
      relevant.forEach(item => appendHistoryItem(item));
    }

    connectWS();
    document.getElementById('logout-btn').addEventListener('click', doLogout);
    document.getElementById('send-btn').addEventListener('click', sendShare);
    document.getElementById('message-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendShare(); }
    });
    document.getElementById('popup-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('popup-overlay')) closePopup();
    });
    document.getElementById('popup-dismiss').addEventListener('click', closePopup);
    document.getElementById('popup-copy').addEventListener('click', copyPopup);
  }

  function isRelevantToMe(item) {
    return item.from_id === myDevice.id ||
           item.target === 'all' ||
           item.target === myDevice.id;
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connectWS() {
    clearTimeout(wsTimer);
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      setWsStatus(true);
      document.getElementById('send-btn').disabled = false;
    };
    ws.onclose = (e) => {
      setWsStatus(false);
      document.getElementById('send-btn').disabled = true;
      if (e.code !== 4001) wsTimer = setTimeout(connectWS, 3000);
    };
    ws.onerror = () => {};
    ws.onmessage = (e) => {
      try { handleMessage(JSON.parse(e.data)); } catch (_) {}
    };
  }

  function setWsStatus(online) {
    const el = document.getElementById('ws-status');
    if (online) { el.textContent = '● LIVE'; el.className = 'ws-indicator ws-live'; }
    else        { el.textContent = '○ RECONNECTING'; el.className = 'ws-indicator ws-offline'; }
  }

  function handleMessage(msg) {
    if (msg.type === 'ping') return;
    if (msg.type === 'device_list') { updateGrid(msg.devices); return; }
    if (msg.type === 'incoming_share') {
      prependHistoryItem(msg);
      showPopup(msg);
      playAlert();
    }
  }

  // ── Device grid ───────────────────────────────────────────────────────────
  function updateGrid(list) {
    devices = list;
    const grid = document.getElementById('device-grid');
    const bc   = document.getElementById('broadcast-card');
    let onlineOthers = 0;

    list.forEach(d => {
      let card = document.querySelector(`.device-card[data-id="${d.id}"]`);
      if (!card) {
        card = makeCard(d);
        grid.insertBefore(card, bc);
      }
      const isSelf = d.id === myDevice.id;
      const dot    = card.querySelector('.status-dot');
      const lbl    = card.querySelector('.card-label');

      card.classList.toggle('offline', !d.online && !isSelf);
      card.classList.toggle('self', isSelf);

      if (isSelf) {
        dot.className = 'status-dot me';
        lbl.textContent = 'ME';
        lbl.className = 'card-label me';
      } else if (d.online) {
        dot.className = 'status-dot online';
        lbl.textContent = 'ONLINE';
        lbl.className = 'card-label online';
        onlineOthers++;
      } else {
        dot.className = 'status-dot offline';
        lbl.textContent = 'OFFLINE';
        lbl.className = 'card-label offline';
      }
    });

    document.getElementById('online-count').textContent = `${onlineOthers} ONLINE`;
  }

  function makeCard(d) {
    const card = document.createElement('div');
    card.className = 'device-card';
    card.dataset.id = d.id;
    card.innerHTML = `
      <span class="status-dot"></span>
      <div class="card-icon">${d.icon}</div>
      <div class="card-name">${esc(d.name)}</div>
      <div class="card-label"></div>
    `;
    if (d.id !== myDevice.id) {
      card.addEventListener('click', () => selectDevice(d.id));
    }
    return card;
  }

  function selectDevice(id) {
    const d = devices.find(x => x.id === id);
    if (!d || !d.online) return;
    selectedTarget = id;
    document.querySelectorAll('.device-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('broadcast-card').classList.remove('selected');
    document.querySelector(`.device-card[data-id="${id}"]`)?.classList.add('selected');
    const disp = document.getElementById('target-display');
    disp.textContent = `→ ${d.icon} ${d.name}`;
    disp.className = 'target-display';
  }

  function selectBroadcast() {
    selectedTarget = 'all';
    document.querySelectorAll('.device-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('broadcast-card').classList.add('selected');
    const disp = document.getElementById('target-display');
    disp.textContent = '⚡ BROADCAST — ALL DEVICES';
    disp.className = 'target-display broadcast';
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  function sendShare() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ type: 'share', content, target: selectedTarget }));

    const sentItem = {
      type: 'incoming_share',
      from_id: myDevice.id,
      from_name: myDevice.name,
      from_icon: myDevice.icon,
      content,
      target: selectedTarget,
      timestamp: new Date().toISOString(),
      _sent: true,
    };
    prependHistoryItem(sentItem);
    input.value = '';
  }

  // ── History ───────────────────────────────────────────────────────────────
  function prependHistoryItem(item) {
    const empty = document.getElementById('history-empty');
    if (empty) empty.remove();
    const list = document.getElementById('history-list');
    list.insertBefore(makeHistoryEl(item), list.firstChild);
    histCount++;
    document.getElementById('history-count').textContent = histCount;
  }

  function appendHistoryItem(item) {
    const empty = document.getElementById('history-empty');
    if (empty) empty.remove();
    document.getElementById('history-list').appendChild(makeHistoryEl(item));
    histCount++;
    document.getElementById('history-count').textContent = histCount;
  }

  function makeHistoryEl(item) {
    const isSent = item.from_id === myDevice.id;
    const div = document.createElement('div');
    div.className = `history-item ${isSent ? 'sent' : 'received'}`;

    const t = new Date(item.timestamp);
    const timeStr = t.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

    let targetTxt = '';
    if (isSent) {
      if (item.target === 'all') {
        targetTxt = `<span class="hist-arrow">→</span><span class="hist-target">ALL</span>`;
      } else {
        const td = devices.find(x => x.id === item.target);
        targetTxt = `<span class="hist-arrow">→</span><span class="hist-target">${td ? esc(td.name) : item.target}</span>`;
      }
    }

    div.innerHTML = `
      <div class="hist-meta">
        <span class="hist-from">${item.from_icon} ${isSent ? 'YOU' : esc(item.from_name)}</span>
        ${targetTxt}
        <span class="hist-time">${timeStr}</span>
      </div>
      <div class="hist-content">${linkify(item.content)}</div>
    `;
    div.addEventListener('click', () => div.classList.toggle('expanded'));
    return div;
  }

  // ── Popup ─────────────────────────────────────────────────────────────────
  function showPopup(item) {
    document.getElementById('popup-icon').textContent    = item.from_icon;
    document.getElementById('popup-name').textContent    = item.from_name;
    document.getElementById('popup-content').innerHTML   = linkify(item.content);
    const t = new Date(item.timestamp);
    document.getElementById('popup-time').textContent =
      t.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' — ' +
      t.toLocaleTimeString('en-US', { hour12: false });
    document.getElementById('popup-overlay').classList.add('visible');
  }

  function closePopup() {
    document.getElementById('popup-overlay').classList.remove('visible');
  }

  function copyPopup() {
    const text = document.getElementById('popup-content').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('popup-copy');
      btn.textContent = 'COPIED ✓';
      setTimeout(() => { btn.textContent = 'COPY'; }, 1600);
    }).catch(() => {});
  }

  // ── Sound alert ───────────────────────────────────────────────────────────
  function playAlert() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[659, 0], [831, 0.09], [988, 0.18]].forEach(([freq, delay]) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
        osc.start(t);
        osc.stop(t + 0.4);
      });
    } catch (_) {}
  }

  // ── Logout ────────────────────────────────────────────────────────────────
  async function doLogout() {
    if (ws) ws.close(4001);
    await fetch('/logout', { method: 'POST' });
    window.location.href = '/public/login.html';
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function linkify(text) {
    const trimmed = String(text).trim();
    try {
      const url = new URL(trimmed);
      if (url.protocol === 'http:' || url.protocol === 'https:') {
        const escaped = esc(trimmed);
        return `<a href="${escaped}" target="_blank" rel="noopener noreferrer">${escaped}</a>`;
      }
    } catch (_) {}
    return esc(text);
  }

  // ── Keyboard shortcut ─────────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
  });

  window.addEventListener('beforeunload', () => { if (ws) ws.close(); });
  window.addEventListener('load', init);
</script>
</body>
</html>
